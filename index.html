<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LumeLines: Daily Blocks is a relaxing block puzzle about placing glowing shapes, clearing lines, and chasing daily seeds." />
    <title>LumeLines: Daily Blocks</title>
    <script>
      (function () {
        if (document.querySelector("base")) {
          return;
        }
        var path = location.pathname;
        var base = path;
        if (!base.endsWith("/")) {
          if (base.includes(".")) {
            base = base.slice(0, base.lastIndexOf("/") + 1);
          } else {
            base = base + "/";
          }
        }
        var baseTag = document.createElement("base");
        baseTag.href = base || "/";
        document.head.appendChild(baseTag);
      })();
    </script>
  </head>
  <body>
    <div id="app">
      <div id="bg-glow"></div>

      <section id="screen-loading" class="screen screen--active">
        <div class="card">
          <h1 class="title" data-i18n="title.short">LumeLines: Daily Blocks</h1>
          <p class="tagline" data-i18n="tagline">Place. Clear. Glow - every day.</p>
          <div class="loading-bar">
            <span class="loading-fill"></span>
          </div>
          <p class="muted" data-i18n="loading.status">Loading...</p>
        </div>
      </section>

      <section id="screen-menu" class="screen">
        <div class="card wide">
          <div class="brand">
            <h1 class="title" data-i18n="title.full">LumeLines: Daily Blocks</h1>
            <p class="tagline" data-i18n="tagline">Place. Clear. Glow - every day.</p>
          </div>
          <div class="menu-grid">
            <button id="btn-play" class="btn primary" data-i18n="menu.play">Play</button>
            <button id="btn-daily" class="btn" data-i18n="menu.daily">Daily Challenge</button>
            <button id="btn-menu-reward" class="btn" data-i18n="menu.rewarded">
              Watch Ad (Reward)
            </button>
            <button id="btn-themes" class="btn" data-i18n="menu.themes">Themes</button>
            <button id="btn-settings" class="btn" data-i18n="menu.settings">Settings</button>
          </div>
          <div class="menu-meta">
            <div class="pill">
              <span data-i18n="menu.best">Best</span>
              <strong id="menu-best">0</strong>
            </div>
            <div class="pill">
              <span data-i18n="menu.tokens">Tokens</span>
              <strong id="menu-tokens">0</strong>
            </div>
            <div id="adblock-banner" class="hint" hidden data-i18n="menu.adblock">
              Adblock detected. You can still play normally.
            </div>
          </div>
        </div>
      </section>

      <section id="screen-game" class="screen">
        <div class="hud">
          <div class="hud-left">
            <div class="pill">
              <span data-i18n="hud.score">Score</span>
              <strong id="hud-score">0</strong>
            </div>
            <div class="pill">
              <span data-i18n="hud.combo">Combo</span>
              <strong id="hud-combo">x1.00</strong>
            </div>
          </div>
          <div class="hud-right">
            <div class="pill">
              <span data-i18n="hud.tokens">Tokens</span>
              <strong id="hud-tokens">0</strong>
            </div>
            <button id="btn-pause" class="btn ghost" data-i18n="hud.pause">Pause</button>
          </div>
        </div>
        <div class="canvas-wrap">
          <canvas id="game-canvas" width="900" height="1200"></canvas>
        </div>
      </section>

      <section id="screen-pause" class="screen">
        <div class="card">
          <h2 class="title" data-i18n="pause.title">Paused</h2>
          <div class="menu-grid">
            <button id="btn-resume" class="btn primary" data-i18n="pause.resume">Resume</button>
            <button id="btn-restart" class="btn" data-i18n="pause.restart">Restart</button>
            <button id="btn-pause-settings" class="btn" data-i18n="pause.settings">Settings</button>
            <button id="btn-pause-menu" class="btn ghost" data-i18n="pause.menu">Main Menu</button>
          </div>
        </div>
      </section>

      <section id="screen-results" class="screen">
        <div class="card wide">
          <h2 class="title" data-i18n="results.title">Run Complete</h2>
          <div class="results-grid">
            <div class="stat">
              <span data-i18n="results.score">Score</span>
              <strong id="results-score">0</strong>
            </div>
            <div class="stat">
              <span data-i18n="results.best">Best</span>
              <strong id="results-best">0</strong>
            </div>
            <div class="stat">
              <span data-i18n="results.tokens">Tokens</span>
              <strong id="results-tokens">0</strong>
            </div>
          </div>
          <div class="menu-grid">
            <button id="btn-continue" class="btn primary" data-i18n="results.continue">
              Continue (Rewarded)
            </button>
            <button id="btn-double" class="btn" data-i18n="results.double">
              Double Tokens (Rewarded)
            </button>
            <button id="btn-play-again" class="btn" data-i18n="results.play_again">Play Again</button>
            <button id="btn-results-menu" class="btn ghost" data-i18n="results.menu">Main Menu</button>
          </div>
          <p id="results-hint" class="hint"></p>
        </div>
      </section>

      <section id="screen-themes" class="screen">
        <div class="card wide">
          <h2 class="title" data-i18n="themes.title">Themes</h2>
          <div id="themes-grid" class="themes-grid"></div>
          <div class="menu-grid">
            <button id="btn-themes-back" class="btn ghost" data-i18n="themes.back">Back</button>
          </div>
        </div>
      </section>

      <section id="screen-settings" class="screen">
        <div class="card">
          <h2 class="title" data-i18n="settings.title">Settings</h2>
          <div class="settings-grid">
            <label class="toggle">
              <input id="setting-music" type="checkbox" />
              <span data-i18n="settings.music">Music</span>
            </label>
            <label class="toggle">
              <input id="setting-sfx" type="checkbox" />
              <span data-i18n="settings.sfx">SFX</span>
            </label>
            <label class="toggle">
              <input id="setting-tap" type="checkbox" />
              <span data-i18n="settings.tap">Tap to place</span>
            </label>
            <label class="toggle">
              <span data-i18n="settings.language">Language</span>
              <select id="setting-language" class="setting-select">
                <option value="en" data-i18n="language.en">English</option>
                <option value="ru" data-i18n="language.ru">Русский</option>
              </select>
            </label>
          </div>
          <div class="menu-grid">
            <button id="btn-settings-close" class="btn ghost" data-i18n="settings.close">Close</button>
          </div>
        </div>
      </section>

      <div id="toast" class="toast"></div>
      <div id="debug-overlay" class="debug" hidden></div>
    </div>
    <script type="module">
      (function () {
        const platform = import.meta.env.VITE_PLATFORM || "generic";
        const rawUseMock = import.meta.env.VITE_USE_PLATFORM_MOCK;
        const useMockExplicit = rawUseMock === "1" || rawUseMock === "true";
        const useMockImplicit = rawUseMock == null && import.meta.env.DEV;
        if (useMockExplicit || useMockImplicit) {
          return;
        }
        const script = document.createElement("script");
        script.async = true;
        if (platform === "crazygames") {
          script.src = "https://sdk.crazygames.com/crazygames-sdk-v3.js";
          document.head.appendChild(script);
          return;
        }
        if (platform === "yandex") {
          script.src = "https://yandex.ru/games/sdk/v2";
          document.head.appendChild(script);
          return;
        }
        if (platform === "poki") {
          script.src = "https://game-cdn.poki.com/scripts/v2/poki-sdk.js";
          document.head.appendChild(script);
          return;
        }
        if (platform === "vkplay") {
          script.src = "https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js";
          script.onload = () => {
            const bridge = window.vkBridge || window.VKBridge || window.VKPlayBridge;
            if (bridge?.send) {
              bridge.send("VKWebAppInit");
            }
          };
          document.head.appendChild(script);
        }
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
